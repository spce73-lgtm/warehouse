<!doctype html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>اسکنر انبارگردانی</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f4c81">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="اسکنر انبار">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ============ صفحه‌ی ورود ============ -->
<div class="screen active" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg>
    </div>
    <div class="login-title">اسکنر انبارگردانی</div>
    <div class="login-sub">ورود با همان نام کاربری سامانه انبار</div>
    <div id="loginMsg"></div>

    <div class="server-field">
      <label style="display:block;font-size:12.5px;font-weight:700;color:#5a6472;margin-bottom:6px;">آدرس سامانه (فقط بار اول)</label>
      <input type="text" id="serverUrlInput" placeholder="https://script.google.com/macros/s/XXXXX/exec" autocomplete="off">
      <small>این آدرس همان لینک وب‌اپ گوگل‌شیت شماست؛ یک‌بار وارد کنید، ذخیره می‌شود.</small>
    </div>

    <div class="field">
      <label>نام کاربری</label>
      <input type="text" id="loginUsername" autocomplete="username">
    </div>
    <div class="field">
      <label>رمز عبور</label>
      <input type="password" id="loginPassword" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">ورود</button>
  </div>
</div>

<!-- ============ صفحه‌ی اصلی (جست‌وجو + نتایج + جزئیات) ============ -->
<div class="screen" id="mainScreen">
  <div class="top-strip">
    <button class="icon-btn" onclick="doLogout()" title="خروج">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
    <div class="who"><span id="whoLabel">—</span><span id="whoSub"></span></div>
    <div style="width:36px;"></div>
  </div>

  <div class="search-row">
    <input type="text" id="searchInput" placeholder="کد یا نام کالا را وارد کنید..." inputmode="search">
    <button class="icon-btn accent" onclick="doSearch()" title="جست‌وجو">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.6" y2="16.6"/></svg>
    </button>
  </div>

  <div id="resultArea">
    <div class="section-title">آخرین موارد ثبت‌شده در این جلسه</div>
    <div id="recentList"><div class="empty-hint">دوربین گوشی را روی کیوآرکد کالا بگیرید، یا کد/نام را اینجا تایپ کنید.</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
